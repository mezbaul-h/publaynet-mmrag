# Base configuration shared by both pipeline arms.
# Overlaid by configs/baseline.yaml or configs/enhanced.yaml.

mode: baseline

paths:
  data_root: data
  crops_dir: data/crops
  regions_dir: data/regions
  chunks_path: data/chunks.jsonl
  qdrant_path: data/qdrant
  kg_path: data/kg.graphml
  qa_path: data/qa.jsonl
  results_dir: data/results

ingest:
  source: webdataset           # 'webdataset' (subset) or 'coco' (full set).
  shard_urls:
    - https://huggingface.co/datasets/lhoestq/small-publaynet-wds/resolve/main/publaynet-train-000000.tar
    - https://huggingface.co/datasets/lhoestq/small-publaynet-wds/resolve/main/publaynet-train-000001.tar
    - https://huggingface.co/datasets/lhoestq/small-publaynet-wds/resolve/main/publaynet-train-000002.tar
    - https://huggingface.co/datasets/lhoestq/small-publaynet-wds/resolve/main/publaynet-train-000003.tar
  coco_annotations: ""
  coco_image_dir: ""
  max_pages: 0                 # 0 = no limit; set small for a quick smoke test.
  streaming: false             # WebDataset only. False downloads the subset
                               # shards up front (visible bar + full ETA, ~1.22
                               # GB); set true to stream without downloading
                               # (good for tiny runs, but no ETA).

models:
  device: cuda                 # Index/build stages (throughput-bound).
  retrieval_device: cpu        # Serve-time query models, to spare VRAM.
  rerank_device: cuda            # "" = use retrieval_device. Set to cuda to run
                               # only the reranker on GPU (big Stage 4 speed-up;
                               # ~1 GB on top of the ~8 GB LLM, fits 12 GiB).
  text_embed_model: BAAI/bge-m3
  text_embed_dim: 1024
  image_embed_model: google/siglip2-base-patch16-224
  image_embed_dim: 768
  reranker_model: BAAI/bge-reranker-v2-m3
  ner_model: urchade/gliner_medium-v2.1
  caption_model: Qwen/Qwen2.5-VL-3B-Instruct   # qwen3-vl needs transformers>4.56
  ocr_detector_batch_size: 24     # Lower if Stage 1 OOMs; raise for more speed  (280mb vram on avg each; default: 32)
  ocr_recognition_batch_size: 128 # on a larger GPU. Defaults target 12 GiB.  (50mb vram on avg each; default: 256)
  llm_model: Qwen/Qwen3-4B-Instruct-2507   # Hugging Face id; runs in-process.
  llm_dtype: float16
  llm_load_in_4bit: false               # true needs the optional 'quant' extra.
  llm_max_new_tokens: 512

chunk:
  max_chars: 1200
  overlap_chars: 150
  min_chars: 40

retrieval:
  top_k: 5
  candidate_k: 30
  use_sparse: false
  use_image: false
  use_graph: false
  use_rerank: false
  graph_hops: 1
  rrf_k: 60            # Reciprocal Rank Fusion damping constant.
  text_weight: 1.0     # Per-channel fusion weights (rank-based, not raw-score).
  image_weight: 1.0    # Equal weights interleave channels so a top image/graph
  graph_weight: 1.0    # hit reaches top_k; rerank then refines cross-modally.

kg:
  entity_labels: [method, dataset, metric, result, author, task, model]
  ner_threshold: 0.5
  use_llm_relations: true       # false = entities + co-occurrence only (minutes
                                # vs hours over the full corpus).
  max_relation_chunks: 2000        # 0 = LLM relations on all chunks; set e.g. 2000
                                # to cap the slow LLM relation extraction.
  cooccurrence: true
  checkpoint_every: 200        # Save the graph every N chunks (0 = only at end).

generation:
  temperature: 0.1
  max_context_items: 6
  chain_of_thought: true
  num_ctx: 8192
  vision_generation: false      # Serve/demo set this on to answer with a VLM that
                                # reads figure/table crops; off for eval (keeps the
                                # reported numbers and avoids loading two LLMs).

eval:
  num_questions: 300           # Text split: questions whose gold is a text chunk.
  num_visual_questions: 100    # Visual split: gold is a figure/table region.
  num_multihop_questions: 100  # Multihop split: gold is a KG-bridge chunk.
  caption_sample_size: 500     # Visual regions captioned for the visual split.
  ks: [1, 3, 5, 10]
  use_llm_judge: true
  judge_sample_size: 50        # LLM-judge up to this many answers per split.
  seed: 42
